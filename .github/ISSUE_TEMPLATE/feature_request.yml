name: Feature request
description: Propose a new feature
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What do you propose?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
