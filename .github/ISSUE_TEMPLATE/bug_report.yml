name: Bug report
description: Report a bug or regression
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting this bug."
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area
      description: frontend / engine / api / infra
      placeholder: engine
