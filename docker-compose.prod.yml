services:
  virtuadoc:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: virtuadoc-web:prod
    environment:
      NODE_ENV: production
      PORT: 8085
      HOSTNAME: 0.0.0.0
      DOCUMENT_ENGINE_URL: http://document_engine:8090
    command: ["node", "server.js"]
    ports:
      - "127.0.0.1:8085:8085"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8085/"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  document_engine:
    image: virtuadoc-document-engine:prod
    build:
      context: .
      dockerfile: document_engine/Dockerfile
    command: ["uvicorn", "document_engine.main:app", "--host", "0.0.0.0", "--port", "8090"]
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - /var/lib/virtuadoc/document_engine_config:/workspace/document_engine/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
