aliases:
  souscripteur: ["adherent", "souscripteur principal", "titulaire"]
  beneficiaire: ["bénéficiaire", "beneficiaires", "clause bénéficiaire"]
  date: ["date de signature", "fait le"]
  signature: ["signatures", "signature du souscripteur"]
  name: ["nom", "prénom", "prenom"]
  stamp: ["cachet", "tampon"]
  checkbox: ["cocher", "case à cocher"]

regex:
  date:
    - "\\b(0?[1-9]|[12][0-9]|3[01])[\\/\\-.](0?[1-9]|1[0-2])[\\/\\-.](19|20)\\d{2}\\b"
  signature:
    - "\\bsignature\\b"
  name:
    - "\\bnom\\s*:\\s*[A-Za-zÀ-ÿ' -]{2,}"
