services:
  virtuadoc:
    image: node:20-alpine
    working_dir: /app
    command: >-
      sh -lc 'if [ ! -f package.json ]; then
      echo "package.json absent dans /app. Initialise le projet (ex: npx create-next-app .) puis relance.";
      sleep infinity;
      else
      npm ci --include=dev || npm install;
      npm run build;
      npm run start -- -p 8085 -H 0.0.0.0;
      fi'
    environment:
      NODE_ENV: production
      DOCUMENT_ENGINE_URL: http://document_engine:8090
    volumes:
      - ./:/app
    ports:
      - "127.0.0.1:8085:8085"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8085/"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  document_engine:
    build:
      context: .
      dockerfile: document_engine/Dockerfile
    working_dir: /workspace
    command: uvicorn document_engine.main:app --host 0.0.0.0 --port 8090
    volumes:
      - ./document_engine:/workspace/document_engine
    ports:
      - "127.0.0.1:8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
